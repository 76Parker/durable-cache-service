syntax = "proto3";

package cache.v1;

message Int64Array {
  repeated int64 value = 1;
}

message StringArray {
  repeated string value = 1;
}

message InsertRequest {
  string key = 1;
  oneof value {
    int64 int64_val = 2;
    int32 int32_val = 3;
    string string_val = 4;

    Int64Array int64_array_val = 5;
    StringArray string_array_val = 6;
  }
}

message GetResponse {
  string key = 1;
  oneof value {
    int64 int64_val = 2;
    int32 int32_val = 3;
    string string_val = 4;

    Int64Array int64_array_val = 5;
    StringArray string_array_val = 6;
  }
}

message GetRequest {
  string key = 1;
}