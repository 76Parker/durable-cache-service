syntax = "proto3";

option go_package = "github.com/76Parker/durable-cache-service/api/cache/v1;v1";
package cache.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

message SetRequest {
  string key = 1;
  bytes data = 2;
  google.protobuf.Duration ttl = 3;
}

message SetResponse {
  google.protobuf.Timestamp expire_at = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes data = 1;
  google.protobuf.Timestamp expire_at = 2;
}
